name: Bug report
description: Report a reproducible problem with localml.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, commands, or code needed to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: localml version
      placeholder: "0.1.0"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, architecture, and relevant dependency versions.
