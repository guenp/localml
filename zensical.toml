# Documentation built with Zensical — https://zensical.org

[project]
site_name = "localml"
site_description = "Local ML experimentation platform demo SDK and control plane."
site_url = "https://guenp.github.io/localml/"
copyright = "Copyright &copy; 2026 Guenevere Prawiroatmodjo"

repo_url = "https://github.com/guenp/localml"
repo_name = "GitHub"
edit_uri = "edit/main/docs"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Design" = "design.md" },
  { "Reference" = [
    { "Overview" = "reference/index.md" },
    { "API" = "reference/api.md" },
  ] },
]

[project.theme]
language = "en"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "teal"
toggle.icon = "lucide/moon-star"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
